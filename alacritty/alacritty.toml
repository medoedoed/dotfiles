

import = [
    "~/.config/alacritty/themes/themes/gruvbox_dark.toml"
]

[font]

size = 15.0


[font.bold]
family = "JetBrainsMono"
style = "Bold"

[font.bold_italic]
family = "JetBrainsMono"
style = "Bold Italic"

[font.italic]
family = "JetBrainsMono"
style = "Italic"

[font.normal]
family = "JetBrainsMono"
style = "Regular"

[window]
opacity = 0.8

[keyboard]
bindings = [
{ key = "Up", mods = "Control|Shift", action = "ScrollLineUp" },
{ key = "Down", mods = "Control|Shift", action = "ScrollLineDown" },
]
